<!DOCTYPE html>
<html>
<head>
<title>My Movie Hub</title>

<style>

body{
background:black;
color:white;
font-family:Arial;
margin:0;
}

header{
background:#111;
padding:20px;
font-size:28px;
color:red;
text-align:center;
}

.movies{
display:flex;
gap:20px;
padding:20px;
flex-wrap:wrap;
}

.movie{
width:200px;
cursor:pointer;
}

.movie img{
width:100%;
border-radius:10px;
transition:0.3s;
}

.movie img:hover{
transform:scale(1.1);
}

.player{
text-align:center;
padding:20px;
}

iframe{
width:80%;
height:400px;
border:none;
}

</style>

</head>

<body>

<header>My Movie Hub</header>

<h2>Action Movies</h2>

<div class="movies">

<div class="movie" onclick="playMovie('https://www.youtube.com/embed/dQw4w9WgXcQ')">
<img src="https://i.imgur.com/7D7I6dI.jpeg">
<p>Action Movie 1</p>
</div>

<div class="movie" onclick="playMovie('https://www.youtube.com/embed/tgbNymZ7vqY')">
<img src="https://i.imgur.com/4YQZ1ZC.jpeg">
<p>Action Movie 2</p>
</div>

</div>


<h2>Comedy Movies</h2>

<div class="movies">

<div class="movie" onclick="playMovie('https://www.youtube.com/embed/ysz5S6PUM-U')">
<img src="https://i.imgur.com/VhY7sYF.jpeg">
<p>Comedy Movie 1</p>
</div>

</div>

<div class="movie" onclick="playMovie('https://www.youtube.com/embed/tgbNymZ7vqY')">
<img src="https://i.imgur.com/4YQZ1ZC.jpeg">
<p>Movie 2</p>
</div>

<div class="movie" onclick="playMovie('https://www.youtube.com/embed/ysz5S6PUM-U')">
<img src="https://i.imgur.com/VhY7sYF.jpeg">
<p>Movie 3</p>
</div>

</div>

<div class="player">
<iframe id="player"></iframe>
</div>

<script>

function playMovie(link){
document.getElementById("player").src = link;
}

</script>

</body>
</html>
